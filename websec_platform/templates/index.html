<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WebSec Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}"/>
</head>
<body>
  <div id="app-root"></div>

  <!-- Server-side config injected for JS to consume -->
  <script>
    window.WEBSEC_CONFIG = {
      hasApiKey: {{ 'true' if has_api_key else 'false' }},
      appVersion: "{{ app_version }}",
      apiBase: "/api"
    };
  </script>

  {% if not has_api_key %}
  <div id="api-key-banner">
    <span>⚠ ANTHROPIC_API_KEY not set — report generation disabled.</span>
    <span>Add it to your <code>.env</code> file and restart.</span>
  </div>
  {% endif %}

  <div id="app"></div>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
